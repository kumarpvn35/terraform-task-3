name: Terraform Multi-Stage Deployment

on:
  pull_request:
    branches:
      - master
    paths:
      - "Infra/**"
      - ".github/workflows/terraform.yml"

  push:
    branches:
      - master
    paths:
      - "Infra/**"
      - ".github/workflows/terraform.yml"

  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: terraform-${{ github.ref }}
  cancel-in-progress: false

env:
  TF_VERSION: "1.14.0"
  TF_WORKING_DIRECTORY: "Infra"
  TF_IN_AUTOMATION: "true"
  TF_INPUT: "false"

jobs:

  # ============================================================
  # 1. STATIC VALIDATION
  # ============================================================

  validate:
    name: Terraform Validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Check Terraform formatting
        working-directory: ${{ env.TF_WORKING_DIRECTORY }}
        run: terraform fmt -check -recursive

      - name: Initialize Terraform without backend
        working-directory: ${{ env.TF_WORKING_DIRECTORY }}
        run: terraform init -backend=false

      - name: Validate Terraform configuration
        working-directory: ${{ env.TF_WORKING_DIRECTORY }}
        run: terraform validate


  # ============================================================
  # 2. DEV PLAN
  # Runs for pull requests and main branch
  # ============================================================

  dev-plan:
    name: Dev - Terraform Plan
    runs-on: ubuntu-latest
    needs:
      - validate

    env:
      ARM_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
      ARM_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
      ARM_USE_OIDC: "true"
      ARM_USE_AZUREAD: "true"

    environment:
      name: dev

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Azure login using OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Initialize Dev backend
        working-directory: ${{ env.TF_WORKING_DIRECTORY }}
        run: |
          terraform init \
            -reconfigure \
            -backend-config="environments/dev/backend.hcl"

      - name: Create Dev plan
        working-directory: ${{ env.TF_WORKING_DIRECTORY }}
        run: |
          terraform plan \
            -var-file="environments/dev/dev.tfvars" \
            -out="dev.tfplan"

      - name: Generate readable Dev plan
        working-directory: ${{ env.TF_WORKING_DIRECTORY }}
        run: terraform show -no-color dev.tfplan > dev-plan.txt

      - name: Upload Dev Terraform plan
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: dev-terraform-plan
          path: |
            Infra/dev.tfplan
            Infra/dev-plan.txt
          retention-days: 1
          if-no-files-found: error

      - name: Upload Dev plan preview
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: dev-plan-preview
          path: Infra/dev-plan.txt
          retention-days: 5
          if-no-files-found: error


  # ============================================================
  # 3. DEV APPLY
  # Runs only after merge/push to main
  # ============================================================

  dev-apply:
    name: Dev - Terraform Apply
    runs-on: ubuntu-latest

    needs:
      - dev-plan

    if: github.event_name != 'pull_request'

    environment:
      name: dev

    env:
      ARM_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
      ARM_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
      ARM_USE_OIDC: "true"
      ARM_USE_AZUREAD: "true"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Azure login using OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Initialize Dev backend
        working-directory: ${{ env.TF_WORKING_DIRECTORY }}
        run: |
          terraform init \
            -reconfigure \
            -backend-config="environments/dev/backend.hcl"

      - name: Download Dev Terraform plan
        uses: actions/download-artifact@v4
        with:
          name: dev-terraform-plan
          path: Infra

      - name: Apply Dev Terraform plan
        working-directory: ${{ env.TF_WORKING_DIRECTORY }}
        run: terraform apply -auto-approve dev.tfplan

      - name: Export Terraform deployment outputs
        working-directory: ${{ env.TF_WORKING_DIRECTORY }}
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p deployment-metadata

          ACR_NAME="$(terraform output -raw acr_name)"
          ACR_LOGIN_SERVER="$(terraform output -raw acr_login_server)"
          AKS_NAME="$(terraform output -raw aks_name)"
          AKS_RESOURCE_GROUP="$(terraform output -raw aks_resource_group_name)"

          if [ -z "$ACR_NAME" ]; then
            echo "Terraform output acr_name is empty."
            exit 1
          fi

          if [ -z "$ACR_LOGIN_SERVER" ]; then
            echo "Terraform output acr_login_server is empty."
            exit 1
          fi

          jq -n \
            --arg acr_name "$ACR_NAME" \
            --arg acr_login_server "$ACR_LOGIN_SERVER" \
            --arg aks_name "$AKS_NAME" \
            --arg aks_resource_group "$AKS_RESOURCE_GROUP" \
            '{
              acr_name: $acr_name,
              acr_login_server: $acr_login_server,
              aks_name: $aks_name,
              aks_resource_group: $aks_resource_group
            }' > deployment-metadata/infrastructure.json

          echo "Infrastructure metadata created:"
          jq . deployment-metadata/infrastructure.json

      - name: Upload infrastructure metadata
        uses: actions/upload-artifact@v4
        with:
          name: infrastructure-metadata
          path: Infra/deployment-metadata/infrastructure.json
          retention-days: 90
          if-no-files-found: error


